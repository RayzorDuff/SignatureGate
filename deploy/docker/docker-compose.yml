services:
  # --- SignatureGate Postgres ---
  signaturegate-postgres:
    image: postgres:16
    container_name: signaturegate-postgres
    environment:
      POSTGRES_DB: ${SIG_DB_NAME}
      POSTGRES_USER: ${SIG_DB_USER}
      POSTGRES_PASSWORD: ${SIG_DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - signaturegate_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SIG_DB_USER} -d ${SIG_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # --- MushroomProcess bridge Postgres (optional) ---
  mushroomprocess-bridge-postgres:
    image: postgres:16
    container_name: mushroomprocess-bridge-postgres
    environment:
      POSTGRES_DB: ${MP_BRIDGE_DB_NAME}
      POSTGRES_USER: ${MP_BRIDGE_DB_USER}
      POSTGRES_PASSWORD: ${MP_BRIDGE_DB_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - mushroomprocess_bridge_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MP_BRIDGE_DB_USER} -d ${MP_BRIDGE_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # --- NocoDB metadata Postgres ---
  nocodb-meta-postgres:
    image: postgres:16
    container_name: nocodb-meta-postgres
    environment:
      POSTGRES_DB: ${NC_DB_NAME}
      POSTGRES_USER: ${NC_DB_USER}
      POSTGRES_PASSWORD: ${NC_DB_PASSWORD}   
    volumes:
      - nocodb_meta_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  nocodb:
    image: nocodb/nocodb:latest
    container_name: nocodb
    depends_on:
      - nocodb-meta-postgres
      - signaturegate-postgres
      - mushroomprocess-bridge-postgres
    environment:
      NC_DB: pg://${NC_DB_HOST}:${NC_DB_PORT}?u=${NC_DB_USER}&p=${NC_DB_PASSWORD}&d=${NC_DB_NAME}
      NC_AUTH_JWT_SECRET: ${NC_AUTH_JWT_SECRET}
      NC_MAX_ATTACHMENT_FIELD_SIZE: ${NC_MAX_ATTACHMENT_FIELD_SIZE}
      NC_ATTACHMENT_FIELD_SIZE: ${NC_ATTACHMENT_FIELD_SIZE}
      NC_MAX_ATTACHMENTS_ALLOWED: ${NC_MAX_ATTACHMENTS_ALLOWED}
      NC_PUBLIC_URL: ${NC_PUBLIC_URL}
      NC_ATTACHMENT_EXPIRE_SECONDS: ${NC_ATTACHMENT_EXPIRE_SECONDS}
      NC_SECURE_ATTACHMENTS: ${NC_SECURE_ATTACHMENTS}
    ports:
      - "8080:8080"
    volumes:
      - nocodb_data:/usr/app/data
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    environment:
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: ${N8N_PORT}
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE}
      N8N_PROXY_HOPS: ${N8N_PROXY_HOPS}
      WEBHOOK_URL: ${WEBHOOK_URL}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: false
      DOCUMENSO_BASE_URL: ${DOCUMENSO_PUBLIC_URL}
      DOCUMENSO_API_TOKEN: ${DOCUMENSO_API_TOKEN}
      NOCODB_BASE_URL: ${NC_PUBLIC_URL}
      NOCODB_API_TOKEN: ${NOCODB_API_TOKEN}
      TZ: America/Denver
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n

  appsmith:
    image: appsmith/appsmith-ce:latest
    container_name: appsmith
    environment:
      APPSMITH_SERVER_TIMEOUT: ${APPSMITH_SERVER_TIMEOUT}
      APPSMITH_CODEC_SIZE: ${APPSMITH_CODEC_SIZE}
    ports:
      - "8081:80"
    volumes:
      - appsmith_stacks:/appsmith-stacks

  # --- Documenso Postgres ---
  documenso-postgres:
    image: postgres:16
    container_name: documenso-postgres
    environment:
      POSTGRES_DB: ${DOCUMENSO_DB_NAME}
      POSTGRES_USER: ${DOCUMENSO_DB_USER}
      POSTGRES_PASSWORD: ${DOCUMENSO_DB_PASSWORD}
    ports:
      - "5435:5432"
    volumes:
      - documenso_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DOCUMENSO_DB_USER} -d ${DOCUMENSO_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # --- Documenso ---
  documenso:
    build:
      context: .
      # Alpine based
      # dockerfile: documenso.playwright.Dockerfile
      # Debian based (preferred)
      dockerfile: documenso.Dockerfile
    container_name: documenso
    depends_on:
      - documenso-postgres
    environment:
      # Public URL used for auth callbacks + links
      NEXT_PUBLIC_WEBAPP_URL: ${DOCUMENSO_PUBLIC_URL}
  
      # IMPORTANT (fixes job internal URL issue):
      NEXT_PRIVATE_INTERNAL_WEBAPP_URL: http://documenso:3000
      NEXT_PRIVATE_JOBS_PROVIDER: local
  
      # Secrets  
      NEXTAUTH_SECRET: ${DOCUMENSO_NEXTAUTH_SECRET}
      NEXT_PRIVATE_ENCRYPTION_KEY: ${DOCUMENSO_ENCRYPTION_KEY}
      NEXT_PRIVATE_ENCRYPTION_SECONDARY_KEY: ${DOCUMENSO_ENCRYPTION_SECONDARY_KEY}

      # DB
      NEXT_PRIVATE_DATABASE_URL: postgresql://${DOCUMENSO_DB_USER}:${DOCUMENSO_DB_PASSWORD}@${DOCUMENSO_DB_HOST}:${DOCUMENSO_DB_PORT}/${DOCUMENSO_DB_NAME}
      NEXT_PRIVATE_DIRECT_DATABASE_URL: postgresql://${DOCUMENSO_DB_USER}:${DOCUMENSO_DB_PASSWORD}@${DOCUMENSO_DB_HOST}:${DOCUMENSO_DB_PORT}/${DOCUMENSO_DB_NAME}
  
      # SMTP
      NEXT_PRIVATE_SMTP_TRANSPORT: ${DOCUMENSO_SMTP_TRANSPORT}
      NEXT_PRIVATE_SMTP_HOST: ${DOCUMENSO_SMTP_HOST}
      NEXT_PRIVATE_SMTP_PORT: ${DOCUMENSO_SMTP_PORT}
      NEXT_PRIVATE_SMTP_USERNAME: ${DOCUMENSO_SMTP_USERNAME}
      NEXT_PRIVATE_SMTP_PASSWORD: ${DOCUMENSO_SMTP_PASSWORD}
      NEXT_PRIVATE_SMTP_FROM_NAME: ${DOCUMENSO_SMTP_FROM_NAME}
      NEXT_PRIVATE_SMTP_FROM_ADDRESS: ${DOCUMENSO_SMTP_FROM_ADDRESS}
      NEXT_PRIVATE_SMTP_SECURE: ${DOCUMENSO_PRIVATE_SMTP_SECURE}
      NEXT_PRIVATE_SMTP_UNSAFE_IGNORE_TLS: ${DOCUMENSO_PRIVATE_SMTP_UNSAFE_IGNORE_TLS}
  
      # Signing certificate passphrase
      NEXT_PRIVATE_SIGNING_CERT_PATH: /opt/documenso/cert.p12
      NEXT_PRIVATE_SIGNING_PASSPHRASE: ${DOCUMENSO_SIGNING_PASSPHRASE}

      # Optional: disable public signup once you have an admin user
      NEXT_PUBLIC_DISABLE_SIGNUP: "true"
        
      # Match the cache path:
      PLAYWRIGHT_BROWSERS_PATH: /home/nodejs/.cache/ms-playwright
  
    ports:
      - "3002:3000"
    volumes:
      # Create this file once (see LINODE_SETUP.md), or mount your existing .p12 cert:
      - ../documenso/certs/cert.p12:/opt/documenso/cert.p12
      # Used with Alpine image
      #- documenso_playwright_cache:/home/nodejs/.cache/ms-playwright
    restart: unless-stopped

volumes:
  signaturegate_pgdata:
  mushroomprocess_bridge_pgdata:
  nocodb_meta_pgdata:
  nocodb_data:
  documenso_pgdata:
  # Used with Alpine image
  #documenso_playwright_cache:
  n8n_data:
  appsmith_stacks:
