x-erpnext-image: &erpnext_image
  image: signaturegate-erpnext:${ERPNEXT_IMAGE_TAG}
  pull_policy: never
  build:
    context: .
    dockerfile: erpnext-custom.Dockerfile
    args:
      ERPNEXT_IMAGE_TAG: ${ERPNEXT_IMAGE_TAG}
      ERPNEXT_HRMS_BRANCH: ${ERPNEXT_HRMS_BRANCH}

services:
  # --- SignatureGate Postgres ---
  signaturegate-postgres:
    image: postgres:16
    container_name: signaturegate-postgres
    environment:
      POSTGRES_DB: ${SIG_DB_NAME}
      POSTGRES_USER: ${SIG_DB_USER}
      POSTGRES_PASSWORD: ${SIG_DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - signaturegate_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SIG_DB_USER} -d ${SIG_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # --- MushroomProcess bridge Postgres (optional) ---
  mushroomprocess-bridge-postgres:
    image: postgres:16
    container_name: mushroomprocess-bridge-postgres
    environment:
      POSTGRES_DB: ${MP_BRIDGE_DB_NAME}
      POSTGRES_USER: ${MP_BRIDGE_DB_USER}
      POSTGRES_PASSWORD: ${MP_BRIDGE_DB_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - mushroomprocess_bridge_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MP_BRIDGE_DB_USER} -d ${MP_BRIDGE_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # --- NocoDB metadata Postgres ---
  nocodb-meta-postgres:
    image: postgres:16
    container_name: nocodb-meta-postgres
    environment:
      POSTGRES_DB: ${NC_DB_NAME}
      POSTGRES_USER: ${NC_DB_USER}
      POSTGRES_PASSWORD: ${NC_DB_PASSWORD}
    volumes:
      - nocodb_meta_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  nocodb:
    image: nocodb/nocodb:latest
    container_name: nocodb
    depends_on:
      - nocodb-meta-postgres
      - signaturegate-postgres
      - mushroomprocess-bridge-postgres
    environment:
      NC_DB: pg://${NC_DB_HOST}:${NC_DB_PORT}?u=${NC_DB_USER}&p=${NC_DB_PASSWORD}&d=${NC_DB_NAME}
      NC_AUTH_JWT_SECRET: ${NC_AUTH_JWT_SECRET}
      NC_MAX_ATTACHMENT_FIELD_SIZE: ${NC_MAX_ATTACHMENT_FIELD_SIZE}
      NC_ATTACHMENT_FIELD_SIZE: ${NC_ATTACHMENT_FIELD_SIZE}
      NC_MAX_ATTACHMENTS_ALLOWED: ${NC_MAX_ATTACHMENTS_ALLOWED}
      NC_PUBLIC_URL: ${NC_PUBLIC_URL}
      NC_ATTACHMENT_EXPIRE_SECONDS: ${NC_ATTACHMENT_EXPIRE_SECONDS}
      NC_SECURE_ATTACHMENTS: ${NC_SECURE_ATTACHMENTS}
    ports:
      - "8080:8080"
    volumes:
      - nocodb_data:/usr/app/data
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    environment:
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: ${N8N_PORT}
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE}
      N8N_PROXY_HOPS: ${N8N_PROXY_HOPS}
      WEBHOOK_URL: ${WEBHOOK_URL}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: false
      DOCUMENSO_BASE_URL: ${DOCUMENSO_PUBLIC_URL}
      DOCUMENSO_API_TOKEN: ${DOCUMENSO_API_TOKEN}
      NOCODB_BASE_URL: ${NC_PUBLIC_URL}
      NOCODB_API_TOKEN: ${NOCODB_API_TOKEN}
      AIRTABLE_BASE_ID: ${AIRTABLE_BASE_ID}
      AIRTABLE_API_TOKEN: ${AIRTABLE_API_TOKEN}
      GIVEBUTTER_SIGNING_SECRET: ${GIVEBUTTER_SIGNING_SECRET}
      TZ: America/Denver
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

  appsmith:
    image: appsmith/appsmith-ce:latest
    container_name: appsmith
    environment:
      APPSMITH_SERVER_TIMEOUT: ${APPSMITH_SERVER_TIMEOUT}
      APPSMITH_CODEC_SIZE: ${APPSMITH_CODEC_SIZE}
    ports:
      - "8081:80"
    volumes:
      - appsmith_stacks:/appsmith-stacks
    restart: unless-stopped

  # --- Documenso Postgres ---
  documenso-postgres:
    image: postgres:16
    container_name: documenso-postgres
    environment:
      POSTGRES_DB: ${DOCUMENSO_DB_NAME}
      POSTGRES_USER: ${DOCUMENSO_DB_USER}
      POSTGRES_PASSWORD: ${DOCUMENSO_DB_PASSWORD}
    ports:
      - "5435:5432"
    volumes:
      - documenso_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DOCUMENSO_DB_USER} -d ${DOCUMENSO_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # --- Documenso ---
  documenso:
    build:
      context: .
      dockerfile: documenso.Dockerfile
      args:
        DOCUMENSO_REF: ${DOCUMENSO_REF:-main}
    container_name: documenso
    depends_on:
      - documenso-postgres
    environment:
      # Public URL used for auth callbacks + links
      NEXT_PUBLIC_WEBAPP_URL: ${DOCUMENSO_PUBLIC_URL}
  
      # IMPORTANT (fixes job internal URL issue):
      NEXT_PRIVATE_INTERNAL_WEBAPP_URL: http://documenso:3000
      NEXT_PRIVATE_JOBS_PROVIDER: local

      # Secrets  
      NEXTAUTH_SECRET: ${DOCUMENSO_NEXTAUTH_SECRET}
      NEXT_PRIVATE_ENCRYPTION_KEY: ${DOCUMENSO_ENCRYPTION_KEY}
      NEXT_PRIVATE_ENCRYPTION_SECONDARY_KEY: ${DOCUMENSO_ENCRYPTION_SECONDARY_KEY}

      # DB
      NEXT_PRIVATE_DATABASE_URL: postgresql://${DOCUMENSO_DB_USER}:${DOCUMENSO_DB_PASSWORD}@${DOCUMENSO_DB_HOST}:${DOCUMENSO_DB_PORT}/${DOCUMENSO_DB_NAME}
      NEXT_PRIVATE_DIRECT_DATABASE_URL: postgresql://${DOCUMENSO_DB_USER}:${DOCUMENSO_DB_PASSWORD}@${DOCUMENSO_DB_HOST}:${DOCUMENSO_DB_PORT}/${DOCUMENSO_DB_NAME}

      # SMTP
      NEXT_PRIVATE_SMTP_TRANSPORT: ${DOCUMENSO_SMTP_TRANSPORT}
      NEXT_PRIVATE_SMTP_HOST: ${DOCUMENSO_SMTP_HOST}
      NEXT_PRIVATE_SMTP_PORT: ${DOCUMENSO_SMTP_PORT}
      NEXT_PRIVATE_SMTP_USERNAME: ${DOCUMENSO_SMTP_USERNAME}
      NEXT_PRIVATE_SMTP_PASSWORD: ${DOCUMENSO_SMTP_PASSWORD}
      NEXT_PRIVATE_SMTP_FROM_NAME: ${DOCUMENSO_SMTP_FROM_NAME}
      NEXT_PRIVATE_SMTP_FROM_ADDRESS: ${DOCUMENSO_SMTP_FROM_ADDRESS}
      NEXT_PRIVATE_SMTP_SECURE: ${DOCUMENSO_PRIVATE_SMTP_SECURE}
      NEXT_PRIVATE_SMTP_UNSAFE_IGNORE_TLS: ${DOCUMENSO_PRIVATE_SMTP_UNSAFE_IGNORE_TLS}

      # Signing certificate passphrase
      NEXT_PRIVATE_SIGNING_CERT_PATH: /opt/documenso/cert.p12
      NEXT_PRIVATE_SIGNING_PASSPHRASE: ${DOCUMENSO_SIGNING_PASSPHRASE}

      # Optional: disable public signup once you have an admin user
      NEXT_PUBLIC_DISABLE_SIGNUP: "true"

      # Match the cache path:
      PLAYWRIGHT_BROWSERS_PATH: /home/nodejs/.cache/ms-playwright
      NODE_ENV: production

    ports:
      - "3002:3000"
    volumes:
      - ../documenso/certs/cert.p12:/opt/documenso/cert.p12:ro
      - documenso_playwright_cache:/home/nodejs/.cache/ms-playwright
    restart: unless-stopped

  grav:
    image: getgrav/grav:latest
    container_name: grav
    restart: unless-stopped
    ports:
      - "8085:80"
    volumes:
      - ../grav:/var/www/html:rw

  # --- ERPNext / Frappe HR ---
  erpnext-db:
    image: mariadb:${ERPNEXT_MARIADB_VERSION}
    container_name: erpnext-db
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${ERPNEXT_DB_ROOT_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${ERPNEXT_DB_ROOT_PASSWORD}
    volumes:
      - erpnext_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost --password=${ERPNEXT_DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  erpnext-redis-cache:
    image: redis:${ERPNEXT_REDIS_VERSION}
    container_name: erpnext-redis-cache
    volumes:
      - erpnext_redis_cache_data:/data
    restart: unless-stopped

  erpnext-redis-queue:
    image: redis:${ERPNEXT_REDIS_VERSION}
    container_name: erpnext-redis-queue
    volumes:
      - erpnext_redis_queue_data:/data
    restart: unless-stopped

  erpnext-apps-init:
    <<: *erpnext_image
    container_name: erpnext-apps-init
    entrypoint:
      - bash
      - -lc
    command: >
      if [ ! -d /out-apps/frappe ] || [ ! -d /out-apps/erpnext ]; then
        echo 'Initializing ERPNext apps volume from container image...' &&
        cp -a /home/frappe/frappe-bench/apps/. /out-apps/;
      else
        echo 'ERPNext apps volume already initialized.';
      fi
    volumes:
      - erpnext_apps:/out-apps
    restart: "no"

  erpnext-configurator:
    <<: *erpnext_image
    container_name: erpnext-configurator
    depends_on:
      - erpnext-db
      - erpnext-redis-cache
      - erpnext-redis-queue
      - erpnext-apps-init
    entrypoint:
      - bash
      - -lc
    command: >
      mkdir -p sites &&
      printf "frappe\nerpnext\nhrms\n" > sites/apps.txt &&
      bench set-config -g db_host ${ERPNEXT_DB_HOST} &&
      bench set-config -g db_port ${ERPNEXT_DB_PORT} &&
      bench set-config -g redis_cache "redis://${ERPNEXT_REDIS_CACHE_HOST}:${ERPNEXT_REDIS_CACHE_PORT}" &&
      bench set-config -g redis_queue "redis://${ERPNEXT_REDIS_QUEUE_HOST}:${ERPNEXT_REDIS_QUEUE_PORT}" &&
      bench set-config -g redis_socketio "redis://${ERPNEXT_REDIS_QUEUE_HOST}:${ERPNEXT_REDIS_QUEUE_PORT}" &&
      bench set-config -gp socketio_port ${ERPNEXT_SOCKETIO_PORT:-9000}
    volumes:
      - erpnext_apps:/home/frappe/frappe-bench/apps
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    restart: "no"

  erpnext-backend:
    <<: *erpnext_image
    container_name: erpnext-backend
    depends_on:
      - erpnext-configurator
    volumes:
      - erpnext_apps:/home/frappe/frappe-bench/apps
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    environment:
      FRAPPE_REDIS_CACHE: redis://${ERPNEXT_REDIS_CACHE_HOST}:${ERPNEXT_REDIS_CACHE_PORT}
      FRAPPE_REDIS_QUEUE: redis://${ERPNEXT_REDIS_QUEUE_HOST}:${ERPNEXT_REDIS_QUEUE_PORT}
    restart: unless-stopped

  erpnext-websocket:
    <<: *erpnext_image
    container_name: erpnext-websocket
    depends_on:
      - erpnext-backend
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    volumes:
      - erpnext_apps:/home/frappe/frappe-bench/apps
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    environment:
      FRAPPE_SITE_NAME_HEADER: ${ERPNEXT_SITE_NAME}
      REDIS_URL: redis://${ERPNEXT_REDIS_QUEUE_HOST}:${ERPNEXT_REDIS_QUEUE_PORT}
    restart: unless-stopped

  erpnext-queue-short:
    <<: *erpnext_image
    container_name: erpnext-queue-short
    depends_on:
      - erpnext-backend
    command:
      - bench
      - worker
      - --queue
      - short,default
    volumes:
      - erpnext_apps:/home/frappe/frappe-bench/apps
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    environment:
      FRAPPE_REDIS_CACHE: redis://${ERPNEXT_REDIS_CACHE_HOST}:${ERPNEXT_REDIS_CACHE_PORT}
      FRAPPE_REDIS_QUEUE: redis://${ERPNEXT_REDIS_QUEUE_HOST}:${ERPNEXT_REDIS_QUEUE_PORT}
    restart: unless-stopped

  erpnext-queue-long:
    <<: *erpnext_image
    container_name: erpnext-queue-long
    depends_on:
      - erpnext-backend
    command:
      - bench
      - worker
      - --queue
      - long,default,short
    volumes:
      - erpnext_apps:/home/frappe/frappe-bench/apps
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    environment:
      FRAPPE_REDIS_CACHE: redis://${ERPNEXT_REDIS_CACHE_HOST}:${ERPNEXT_REDIS_CACHE_PORT}
      FRAPPE_REDIS_QUEUE: redis://${ERPNEXT_REDIS_QUEUE_HOST}:${ERPNEXT_REDIS_QUEUE_PORT}
    restart: unless-stopped

  erpnext-scheduler:
    <<: *erpnext_image
    container_name: erpnext-scheduler
    depends_on:
      - erpnext-backend
    command:
      - bench
      - schedule
    volumes:
      - erpnext_apps:/home/frappe/frappe-bench/apps
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    environment:
      FRAPPE_REDIS_CACHE: redis://${ERPNEXT_REDIS_CACHE_HOST}:${ERPNEXT_REDIS_CACHE_PORT}
      FRAPPE_REDIS_QUEUE: redis://${ERPNEXT_REDIS_QUEUE_HOST}:${ERPNEXT_REDIS_QUEUE_PORT}
    restart: unless-stopped

  erpnext-frontend:
    <<: *erpnext_image
    container_name: erpnext-frontend
    depends_on:
      - erpnext-backend
      - erpnext-websocket
    command:
      - nginx-entrypoint.sh
    environment:
      BACKEND: erpnext-backend:8000
      SOCKETIO: erpnext-websocket:${ERPNEXT_SOCKETIO_PORT}
      FRAPPE_SITE_NAME_HEADER: ${ERPNEXT_SITE_NAME}
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: 120
      CLIENT_MAX_BODY_SIZE: 50m
    ports:
      - "${ERPNEXT_HTTP_PORT}:8080"
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    restart: unless-stopped

  erpnext-bootstrap:
    <<: *erpnext_image
    container_name: erpnext-bootstrap
    profiles: ["erpnext-init"]
    depends_on:
      - erpnext-db
      - erpnext-redis-cache
      - erpnext-redis-queue
      - erpnext-apps-init
      - erpnext-configurator
      - erpnext-backend
    working_dir: /home/frappe/frappe-bench
    entrypoint:
      - bash
      - /bootstrap/erpnext-bootstrap.sh
    environment:
      ERPNEXT_DB_HOST: ${ERPNEXT_DB_HOST}
      ERPNEXT_DB_PORT: ${ERPNEXT_DB_PORT}
      ERPNEXT_DB_ROOT_PASSWORD: ${ERPNEXT_DB_ROOT_PASSWORD}
      ERPNEXT_ADMIN_PASSWORD: ${ERPNEXT_ADMIN_PASSWORD}
      ERPNEXT_SITE_NAME: ${ERPNEXT_SITE_NAME}
      ERPNEXT_PUBLIC_URL: ${ERPNEXT_PUBLIC_URL}
      ERPNEXT_HRMS_BRANCH: ${ERPNEXT_HRMS_BRANCH}
      ERPNEXT_REDIS_CACHE_HOST: ${ERPNEXT_REDIS_CACHE_HOST}
      ERPNEXT_REDIS_CACHE_PORT: ${ERPNEXT_REDIS_CACHE_PORT}
      ERPNEXT_REDIS_QUEUE_HOST: ${ERPNEXT_REDIS_QUEUE_HOST}
      ERPNEXT_REDIS_QUEUE_PORT: ${ERPNEXT_REDIS_QUEUE_PORT}
      ERPNEXT_SOCKETIO_PORT: ${ERPNEXT_SOCKETIO_PORT}
    volumes:
      - ./erpnext-bootstrap.sh:/bootstrap/erpnext-bootstrap.sh:ro
      - erpnext_apps:/home/frappe/frappe-bench/apps
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    restart: "no"

volumes:
  signaturegate_pgdata:
  mushroomprocess_bridge_pgdata:
  nocodb_meta_pgdata:
  nocodb_data:
  documenso_pgdata:
  documenso_playwright_cache:
  n8n_data:
  appsmith_stacks:
  erpnext_db_data:
  erpnext_redis_cache_data:
  erpnext_redis_queue_data:
  erpnext_sites:
  erpnext_logs:
  erpnext_apps:
